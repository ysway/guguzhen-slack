# 配置文件修改后需要重启程序才能生效
# 登录cookie
cookie: ''
# 道具商店
shop:
  # 是否每天1星沙兑换10w贝壳
  sand_to_shell: false
  # 是否每天1星晶兑换120w贝壳
  crystal_to_shell: false
  # 是否星沙换药水 直到星沙不足或每日上限为止
  sand_to_potion: false
# 沙滩功能
beach:
  # 是否清理沙滩装备（所有沙滩装备回收为锻造石）
  clear_equipment: false
# 许愿池 固定300w贝壳许愿11次
wish: false
# 争夺战场
fight:
  # 战斗模式 0不出击也不翻牌 1打野打满 2打人打满 3打野拿到3狗牌就翻牌 4打人拿到3狗牌就翻牌 5打野拿到3狗牌且段位大于等于期望段位就翻牌 6打人拿到3狗牌且段位大于等于期望段位就翻牌
  battle_mode: 2
  # 期望段位，仅模式5/6生效，支持 C/CC/CCC/B/BB/BBB/A/AA/AAA/S/SS/SSS，大小写不敏感
  target_rank: S
  # 存在透视下的翻牌策略 非透视固定从左往右翻到底
  # 0 翻到2幸运时如果存在2传说则继续往下翻赌传说 其余情况追求透视保底
  # 1 翻到2幸运时无论何种情况都只追求透视保底
  flip_card_mode: 1
  # 使用药水恢复体力次数 0~2次 固定每次用两瓶药水
  use_potion: 0
# 宝石工坊 单次运行时检测到星沙数量大于设置数量时（2~10）就收工 填0不执行
factory: 3
# 每次运行默认先尝试续密钥，成功后会把最新 cookie 回写到 config 目录下对应的 yaml 中
renew_key: true
